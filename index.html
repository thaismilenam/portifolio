<!DOCTYPE html>
<html lang="en">
<head>
<title>CSS Template Thais Milena</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Vidaloka">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=DM+Sans">

<style>


div.gallery {
  border: 1px solid #000;
}

div.gallery:hover {
  border: 1px solid #ff3366;
}

div.gallery img {
  width: 100%;
  height: auto;
}

div.desc {
  padding: 0px;
  text-align: center;
}

.responsive {
  padding: 0 6px;
  float: left;
  width: 24.99999%;
}

@media only screen and (max-width: 700px) {
  .responsive {
    width: 49.99999%;
    margin: 6px 0;
  }
}

@media only screen and (max-width: 500px) {
  .responsive {
    width: 100%;
  }
}

.clearfix:after {
  content: "";
  display: table;
  clear: both;
}

* {
  box-sizing: border-box;
}

@import url(https://fonts.googleapis.com/css?family=Roboto:300,400,600);
.menuabout {
font-family: 'Roboto', Arial, sans-serif;
position: relative;
overflow: hidden;
margin: 10px;
min-width: 230px;
max-width: 315px;
width: 100%;
color: #ffffff;
text-align: left;
line-height: 1.4em;
background-color: #141414;
}
.menuabout * {
-webkit-box-sizing: border-box;
box-sizing: border-box;
-webkit-transition: all 0.25s ease;
transition: all 0.25s ease;
}
.menuabout img {
max-width: 100%;
vertical-align: top;
opacity: 0.85;
}
.menuabout figcaption {
width: 100%;
background-color: #141414;
padding: 25px;
position: relative;
}
.menuabout figcaption:before {
position: absolute;
content: '';
bottom: 100%;
left: 0;
width: 0;
height: 0;
border-style: solid;
border-width: 55px 0 0 400px;
border-color: transparent transparent transparent #141414;
}
.menuabout figcaption a {
padding: 5px;
border: 1px solid #ffffff;
color: #ffffff;
font-size: 0.7em;
text-transform: uppercase;
margin: 10px 0;
display: inline-block;
opacity: 0.65;
width: 47%;
text-align: center;
text-decoration: none;
font-weight: 600;
letter-spacing: 1px;
}
.snip1336 figcaption a:hover {
opacity: 1;
}
.menuabout .profile {
border-radius: 50%;
position: absolute;
bottom: 100%;
left: 25px;
z-index: 1;
max-width: 90px;
opacity: 1;
box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
}
.menuabout .follow {
margin-right: 4%;
border-color: #2980b9;
color: #2980b9;
}
.menuabout h2 {
margin: 0 0 5px;
font-weight: 300;
}
.menuabout h2 span {
display: block;
font-size: 0.5em;
color: #2980b9;
}
.menuabout p {
margin: 0 0 10px;
font-size: 0.8em;
letter-spacing: 1px;
opacity: 0.8;
}

h1{
font-size: 30px;
color: #fff;
}

h2{
font-size: 15px;
text-transform: uppercase;
font-align: center;
color: #fff;
text-align: justify-all;
}

p{
font-size: 0.01px;
}


body {
 background-color: #000;
 overflow-wrap: anywhere;
 font-family: "Vidaloka", serif;
 font-family: "DM Sans", sans serif;
}

/* Style the header */
.header {
  background-color: transparent;
  color: #fff;
  padding: 30px;
  text-align: center;
  font-size: 30px;
}


/* Container for flexboxes */
.row {
  display: -webkit-flex;
  display: flex;
}

/* Create three unequal columns that sits next to each other */
.column {
  padding: 10px;
  height: 300px; /* Should be removed. Only for demonstration */
}

/* Lateral column */
.column.side {
   -webkit-flex: 1;
   -ms-flex: 1;
   flex: 1;
   background-color: #fff;
   border: solid;
   border-radius: 10px;
   border-color: #fff;
   text-align: right;
   font: DM Sans;

}

/* Middle column */
.column.middle {
  -webkit-flex: 2;
  -ms-flex: 2;
  flex: 2;  
   color: #fff;
   border: solid;
   border-color: #000;
   text-align: justify-all;
}

/* Style the footer */
.footer {
  background-color: #000;
  color: #fff;
  font-size: 12px;
  padding: 10px;
  text-align: center;
}

/* Responsive layout - makes the three columns stack on top of each other instead of next to each other */
@media (max-width: 600px) {
  .row {
    -webkit-flex-direction: column;
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>Thais Milena Maciel</h1>
  <h2>Portifólio</h2>
</div>

<div class="responsive">
  <div class="gallery">
    <a target="_blank" href="img_5terre.jpg">
      <img src="img_5terre.jpg" alt="Cinque Terre" width="600" height="400">
    </a>
  </div>
</div>



<div class="responsive">
  <div class="gallery">
    <a target="_blank" href="img_lights.jpg">
      <img src="img_lights.jpg" alt="Northern Lights" width="600" height="400">
    </a>
  </div>
</div>

<div class="responsive">
  <div class="gallery">
    <a target="_blank" href="img_forest.jpg">
      <img src="img_forest.jpg" alt="Forest" width="600" height="400">
    </a>
  </div>
</div>

<div class="responsive">
  <div class="gallery">
    <a target="_blank" href="img_mountains.jpg">
      <img src="img_mountains.jpg" alt="Mountains" width="600" height="400">
    </a>
  </div>
</div>

<div class="clearfix"></div>

<div class="header">
  <p><br></p>
</div>


<div class="row">
  <div class="column middle">Column</div>

<figure class="menuabout">
  <img src="https://imgur.com/UaeGYn4.png" alt="sample87" />
  <figcaption>
    <img src="https://imgur.com/6PNBAea.png" alt="profile-sample4" class="profile" />
    <h2><strong>Skills</strong><span>.</span></h2><p>Web designer, fotógrafia, edição de vídeos e engenharia mecânica.</p>

    </div>
</div>
</div>


<div class="footer">
  <p>Design by Thais Milena.</p>
</div>

</body>
</html>
