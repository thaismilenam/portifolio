<!DOCTYPE html>
<html lang="pt">

<head>
<title>CSS Template Thais Milena</title>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Vidaloka">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=DM+Sans">
</head>

<style>

:root {
  --radius: 5px;
  --padding: 10px;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(5, 1fr);
  grid-gap: 0.5rem;
  height: 100vh;
  grid-template-areas:
    "header header header"
    "content1 content2 content2"
    "content1 content3 content3"
    "content4 content5 content6"
    "footer footer footer";
}

#header {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #c9268d;
  border-radius: var(--radius);
  padding-top: var(--padding);
  grid-area: header;
}

#content1 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #bf1179;
  border-radius: var(--radius);
  padding-top: var(--padding);
  grid-area: content1;
}

#content2 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #d81b60;
  border-radius: var(--radius);
  padding-top: var(--padding);
  grid-area: content2;
}

#content3 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #b31077;
  border-radius: var(--radius);
  padding-top: var(--padding);
  grid-area: content3;
}

#content4 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #c51162;
  border-radius: var(--radius);
  padding-top: var(--padding);
  grid-area: content4;
}
#content5 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #bf1179;
  border-radius: var(--radius);
  padding-top: var(--padding);
  grid-area: content5;
}

#content6 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #880e4f;
  border-radius: var(--radius);
  padding-top: var(--padding);
  grid-area: content6;
}

#footer {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #880e4f;
  border-radius: none;
  padding-top: 20px;
  padding-botton: 80%;
  grid-area: footer;
}

</style>

<body>

<div class="container">
  <div id="header">Thais Milena Maciel</div>
  
  <div id="content1">
  Content 1
  </div>
    
  <div id="content2">
  Content 2
  </div>
  
  <div id="content3">
	<img src="https://i.imgur.com/FPScOlM.jpg" style="width:100%" onclick="onClick(this)" alt="Leaf">
    <img src="https://i.imgur.com/2ZvP97Z.jpg" style="width:100%" onclick="onClick(this)" alt="The moon">
  </div>
  
  <div id="content4">
  Content 4
  </div>
  
  <div id="content5">
  Content 5
  </div>
  
  <div id="content6">
  Content 6
  </div>
  
  <div id="footer">
  Design by Thais Milena<br><br>
  </div>
  
</div>
</body>

</html>
