<!DOCTYPE html>
<html lang="pt">

<head>
<title>CSS Template Thais Milena</title>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Vidaloka">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=DM+Sans">
</head>

<style>

:root {
  --radius: 0px;
  --padding: 0px;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(5, 1fr);
  grid-gap: 0.5rem;
  height: 100vh;
  grid-template-areas:
    "header header header"
    "content1 content2 content2"
    "content1 content3 content3"
    "content4 content5 content6"
    "footer footer footer";
}

#header {
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  padding-top: var(--padding);
  grid-area: header;
}

#header .text-block {
  position: absolute;
  bottom: 250px;
  right: 400px;
  background-color: transparent;
  color: black;
  padding-left: 20px;
  padding-right: 20px;
}

h1 {
  color: black;
  font-family: "Inter", sans-serif;
  font-weight: 800;
  text-transform: lowecase;
}

h4 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: black;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
}

/* Slideshow container */
.slideshow-container {
  max-width: 1000px;
  position: relative;
  margin: auto;
}

/* Hide the images by default */
.mySlides {
  display: none;
}

/* Next & previous buttons */
.next {
  cursor: pointer;
  position: absolute;
  top: 0%;
  width: auto;
  padding: 15px;
  color: white;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s ease;
  user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover, .next:hover {
  background-color: rgba(0,0,0,0.8);
}

/* Caption text */
.text {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

.active, .dot:hover {
  background-color: #717171;
}

/* Fading animation */
.fade {
  animation-name: fade;
  animation-duration: 1.5s;
}

@keyframes fade {
  from {opacity: .4}
  to {opacity: 1}
}

#content1 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  padding-top: 10px;
  grid-area: content1;
}

#content2 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  padding-top: var(--padding);
  grid-area: content2;
}

#content3 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  padding-top: var(--padding);
  grid-area: content3;
}

#content4 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  grid-area: content4;
}

#content5 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  grid-area: content5;
}

#content6 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  grid-area: content6;
}

#footer {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background-image: url("https://www.publicdomainpictures.net/pictures/230000/nahled/light-blue-background.jpg");
  padding-top: 20px;
  padding-botton: 80%;
  grid-area: footer;
}

</style>

<body>

<div class="container">
  <div id="header">
  <img src="https://i.imgur.com/QpoMJi0.png" alt="Norway" style="width:100%;">
  <div class="text-block">
  <h1>Thais Milena Maciel</h1><br>
  <h4>Web developer & photographer</h4>
</div>
  </div>
  
  <div id="content1">
  Content 1
  </div>
    
  <div id="content2">
<div class="slideshow-container">

<div class="mySlides fade">
  <div class="numbertext">1 / 3</div>
  <img src="https://todateen.com.br/wp-content/uploads/2021/01/Ester-Exp%C3%B3sito.jpg" style="width:100%">
  <div class="text">Caption Text</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">2 / 3</div>
  <img src="https://todateen.com.br/wp-content/uploads/2021/01/Ester-Exp%C3%B3sito.jpg" style="width:100%">
  <div class="text">Caption Two</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">3 / 3</div>
  <img src="https://todateen.com.br/wp-content/uploads/2021/01/Ester-Exp%C3%B3sito.jpg" style="width:100%">
  <div class="text">Caption Three</div>
</div>

<a class="next" onclick="plusSlides(1)">❯</a>

</div>
<br>

<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span> 
  <span class="dot" onclick="currentSlide(2)"></span> 
  <span class="dot" onclick="currentSlide(3)"></span> 
</div>
</div>
  
  <div id="content3">
	<img src="https://i.imgur.com/FPScOlM.jpg" style="width:100%" onclick="onClick(this)" alt="Leaf">
    <img src="https://i.imgur.com/2ZvP97Z.jpg" style="width:100%" onclick="onClick(this)" alt="The moon">
  </div>
  
  <div id="content4">
  </div>
  
  <div id="content5">
  </div>
  
  <div id="content6">
  </div>
  
  <div id="footer">
  Design by Thais Milena<br><br>
  </div>
  
</div>
</body>

<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");
  if (n > slides.length) {slideIndex = 1}    
  if (n < 1) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";  
  dots[slideIndex-1].className += " active";
}
</script>

</html>
