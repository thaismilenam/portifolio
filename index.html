<!DOCTYPE html>
<html lang="pt">

<head>
<title>Thais Milena</title>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Vidaloka">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=DM+Sans">
</head>

<style>

body {
  background: black;
}

:root {
  --radius: 0px;
  --padding: 0px;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(5, 1fr);
  grid-gap: 0rem;
  height: 100vh;
  grid-template-areas:
    "header header header"
    "content1 content2 content2"
    "content3 content3 content3"
    "content4 content5 content6"
    "footer footer footer";
}

#header {
  background: transparent;
  padding-top: var(--padding);
  grid-area: header;
}

#header .text-block {
  position: absolute;
  bottom: 250px;
  right: 800px;
  background-color: transparent;
  color: black;
  padding-left: 20px;
  padding-right: 20px;
}

h1 {
  color: black;
  font-family: "Inter", sans-serif;
  font-weight: 800;
  text-transform: lowecase;
}

h2 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: black;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
}

h3 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: black;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
}


h4 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: black;
  text-transform: uppercase;
  font-size: 12px;
  text-align: justify;
}

p {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: black;
  font-size: 12px;
  text-align: justify;
}

/* Slideshow container */
.slideshow-container {
  max-width: 1000px;
  position: relative;
  margin: auto;
}

/* Hide the images by default */
.mySlides {
  display: none;
}

/* Next & previous buttons */
.next {
  cursor: pointer;
  position: absolute;
  top: 0%;
  width: auto;
  padding: 15px;
  color: white;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s ease;
  user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover, .next:hover {
  background-color: rgba(0,0,0,0.8);
}

/* Caption text */
.text {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

.active, .dot:hover {
  background-color: #717171;
}

/* Fading animation */
.fade {
  animation-name: fade;
  animation-duration: 1.5s;
}

@keyframes fade {
  from {opacity: .4}
  to {opacity: 1}
}

#content1 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: transparent;
  padding-top: 10px;
  grid-area: content1;
}

#content2 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: transparent;
  padding-top: var(--padding);
  grid-area: content2;
}

#content3 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: transparent;
  padding-top: var(--padding);
  grid-area: content3;
}

#content4 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: transparent;
  grid-area: content4;
}

#content5 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: transparent;
  grid-area: content5;
}

#content6 {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: transparent;
  grid-area: content6;
}

#footer {
  font-family: "Inter", sans-serif;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  font-size: 12px;
  text-align: center;
  background: #000;
  padding-top: 20px;
  padding-botton: 80%;
  grid-area: footer;
}

/* Style the tab */
.tab {
  float: left;
  background-color: #f1f1f1;
  width: 25%;
  height: 500px;
  filter:grayscale(0%)
}

/* Style the buttons inside the tab */
.tab button {
  display: block;
  background-color: inherit;
  color: black;
  padding: 0px 0px;
  width: 100%;
  border: none;
  outline: none;
  text-align: left;
  cursor: pointer;
  transition: 0.3s;
  font-size: 17px;
  filter:grayscale(100%)

}

/* Change background color of buttons on hover */
.tab button:hover {
  background-color: #ddd;
}

/* Create an active/current "tab button" class */
.tab button.active {
  background-color: gray;
  filter:grayscale(0%)

}

/* Style the tab content */
.tabcontent {
  float: right;
  padding: 0px 12px;
  background: #ffff00;
  width: 70%;
  border-left: none;
  height: 500px;
}

.grid-container {
  display: grid;
  grid-template-columns: auto auto;
  grid-template-rows: 80px 200px;
  gap: 10px;
  background-color: transparent;
  padding: 10px;
}

.grid-container > div {
  background-color: transparent;
  text-align: justify;
  padding: 20px 0;
  font-size: 30px;
}

</style>

<body>

<div class="container">
  <div id="header">
  <img src="https://i.imgur.com/UYD0GAM.png" alt="Norway" style="width:100%;">
  <div class="text-block">
  <h1>Thais Milena Maciel</h1><br>
  <h4>Web developer & photographer</h4>
</div>
  </div>
  
  <div id="content1">
  </div>
    
  <div id="content2">
  </div>
  
  <div id="content3">

<div class="tab">
  <button class="tablinks" onclick="openCity(event, 'London')" id="defaultOpen"><img src="https://i.imgur.com/Z8wfsqk.png" alt="London" style="width:100%;"></button>
  <button class="tablinks" onclick="openCity(event, 'Paris')"><img src="https://i.imgur.com/MTKN7pF.png" alt="Paris" style="width:100%;"></button>
  <button class="tablinks" onclick="openCity(event, 'Tokyo')"><img src="https://i.imgur.com/o6e1lIc.png" alt="Tokyo" style="width:100%;"></button>
</div>

<div id="London" class="tabcontent">
<div class="grid-container">
  <div>  <h4>London</h4>
  <p>London is the capital city of England.</p></div>
  <div><img src="https://i.imgur.com/ihHWcPL.png" alt="insta" style="width:100%;"></div>
</div>

</div>

<div id="Paris" class="tabcontent">
  <h3>Paris</h3>
  <p>Paris is the capital of France.</p> 
</div>

<div id="Tokyo" class="tabcontent">
  <h3>Tokyo</h3>
  <p>Tokyo is the capital of Japan.</p>
</div>

  </div>
  
  <div id="content4">
  </div>
  
  <div id="content5">
  </div>
  
  <div id="content6">
  </div>
  
  <div id="footer">
  Design by Thais Milena<br><br>
  </div>
  
</div>
</body>

<script>

function openCity(evt, cityName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(cityName).style.display = "block";
  evt.currentTarget.className += " active";
}

// Get the element with id="defaultOpen" and click on it
document.getElementById("defaultOpen").click();
</script>

</html>
